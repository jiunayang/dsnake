version: '3'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - dsnake-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=snakeuser
      - POSTGRES_PASSWORD=snakepass123
      - POSTGRES_DB=snakedb
      - POSTGRES_PORT=5432
    depends_on:
      - db
    networks:
      - dsnake-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=snakedb
      - POSTGRES_USER=snakeuser
      - POSTGRES_PASSWORD=snakepass123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snakeuser -d snakedb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dsnake-network

networks:
  dsnake-network:
    driver: bridge

volumes:
  pgdata:
